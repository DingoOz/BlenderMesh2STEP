name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the Python versions Blender 4.2 (3.11) through 5.x (3.13) ship.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy

      - name: Fitting core tests
        working-directory: reverse_mesh
        run: python tests/test_fitting.py

      - name: STEP writer tests
        working-directory: reverse_mesh
        run: python tests/test_step.py

      - name: Byte-compile all modules
        run: python -m compileall reverse_mesh
